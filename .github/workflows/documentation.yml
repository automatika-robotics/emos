name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "Makefile"
      - ".github/workflows/documentation.yml"
  pull_request:
    paths:
      - "docs/**"
      - "Makefile"
      - ".github/workflows/documentation.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# pip is told ahead of time that PEP 668's externally-managed marker on the
# runner's system Python is fine to bypass; lets `make docs-deps` work without
# bespoke flags.
env:
  PIP_BREAK_SYSTEM_PACKAGES: "1"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: make docs-deps

      # `make docs-strict` is available for stricter local checks (warnings
      # as errors, --keep-going). CI uses the lenient build for now because
      # autogenerated apidocs carry pre-existing toctree warnings; flip this
      # to docs-strict once those are fixed and you want PRs to fail loud on
      # any broken cross-reference.
      - name: Build documentation
        run: make docs

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
