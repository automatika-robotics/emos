name: Docker Nightly Build

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3 AM UTC
  push:
    branches: [main]
    paths:
      - "docker/emos/**"
      - "stack/sugarcoat/**"
      - "stack/embodied-agents/**"
      - "stack/kompass/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: automatika-robotics/emos

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble, jazzy, kilted]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.ros_distro }} / ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/emos/Dockerfile
          build-args: ROS_DISTRO=${{ matrix.ros_distro }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.ros_distro }}-nightly-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.ros_distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.ros_distro }}-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy, kilted]
    name: Manifest ${{ matrix.ros_distro }}

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${REGISTRY}/${IMAGE_NAME}:${{ matrix.ros_distro }}-nightly"
          docker manifest create --amend "${TAG}" \
            "${TAG}-amd64" \
            "${TAG}-arm64"
          docker manifest push "${TAG}"
