name: Docker Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.5.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: automatika-robotics/emos

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble, jazzy, kilted]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.ros_distro }} / ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(grep '^VERSION' stack/emos-cli/Makefile | head -1 | sed 's/.*?= *//')" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/emos/Dockerfile
          build-args: ROS_DISTRO=${{ matrix.ros_distro }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.ros_distro }}-${{ steps.version.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.ros_distro }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.ros_distro }}-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy, kilted]
    name: Manifest ${{ matrix.ros_distro }}

    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          sparse-checkout: stack/emos-cli/Makefile

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(grep '^VERSION' stack/emos-cli/Makefile | head -1 | sed 's/.*?= *//')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push multi-arch manifests
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BASE="${REGISTRY}/${IMAGE_NAME}"

          # Version tag: {distro}-{version}
          docker manifest create --amend "${BASE}:${{ matrix.ros_distro }}-${VERSION}" \
            "${BASE}:${{ matrix.ros_distro }}-${VERSION}-amd64" \
            "${BASE}:${{ matrix.ros_distro }}-${VERSION}-arm64"
          docker manifest push "${BASE}:${{ matrix.ros_distro }}-${VERSION}"

          # Latest per distro: {distro}-latest
          docker manifest create --amend "${BASE}:${{ matrix.ros_distro }}-latest" \
            "${BASE}:${{ matrix.ros_distro }}-${VERSION}-amd64" \
            "${BASE}:${{ matrix.ros_distro }}-${VERSION}-arm64"
          docker manifest push "${BASE}:${{ matrix.ros_distro }}-latest"

      - name: Push top-level latest tag (Jazzy only)
        if: matrix.ros_distro == 'jazzy'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BASE="${REGISTRY}/${IMAGE_NAME}"

          docker manifest create --amend "${BASE}:latest" \
            "${BASE}:jazzy-${VERSION}-amd64" \
            "${BASE}:jazzy-${VERSION}-arm64"
          docker manifest push "${BASE}:latest"
